<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f3;--bg2:#f7efe4;--bg3:#f0e5d6;
  --border:#e8ddd5;
  --bx:#5c1a2e;--bx-dk:#3a0e1d;--bx-lt:#7a2340;
  --gold:#c49a7a;--gold-lt:#e8c9ac;
  --dark:#1c1210;--mid:#7a6860;--muted:#a89088;
  --ff:'DM Sans',system-ui,sans-serif;
  --fs:'Syne',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--dark);font-size:16px;line-height:1.6;overflow-x:hidden}
[data-reveal]{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
[data-reveal].vis{opacity:1;transform:translateY(0)}
[data-reveal][data-d="1"]{transition-delay:.1s}[data-reveal][data-d="2"]{transition-delay:.2s}
[data-reveal][data-d="3"]{transition-delay:.3s}[data-reveal][data-d="4"]{transition-delay:.4s}
[data-reveal-scale]{opacity:0;transform:scale(.94);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
[data-reveal-scale].vis{opacity:1;transform:scale(1)}
.hin{animation:hIn .8s cubic-bezier(.16,1,.3,1) both}
.d1{animation-delay:.12s}.d2{animation-delay:.24s}.d3{animation-delay:.36s}.d4{animation-delay:.5s}.d5{animation-delay:.64s}
@keyframes hIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes scrollX{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(253,248,243,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
/* ✅ CORRIGIDO: color:inherit evita azul padrão de link */
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.logo-orb{width:36px;height:36px;border-radius:50%;background:var(--bx);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1}
.lo{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.5px}
.ls{font-size:7px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:1.5px}
.logo-name{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--bx)}
.logo-name em{font-style:normal;color:var(--gold)}
.btn{display:inline-block;text-decoration:none;border:none;cursor:pointer;font-family:var(--ff);font-weight:700;border-radius:100px;transition:all .2s;letter-spacing:.01em}
.btn-bx{background:var(--bx);color:#fff;padding:11px 24px;font-size:13px}
.btn-bx:hover{background:var(--bx-lt);transform:translateY(-1px);box-shadow:0 6px 24px rgba(92,26,46,.25)}
.btn-gold{background:var(--gold);color:var(--bx);padding:16px 36px;font-size:16px;box-shadow:0 8px 32px rgba(196,154,122,.35)}
.btn-gold:hover{background:#d4ab8c;transform:translateY(-2px);box-shadow:0 12px 40px rgba(196,154,122,.45)}
.btn-bx-lg{background:var(--bx);color:#fff;padding:18px 44px;font-size:16px}
.btn-bx-lg:hover{background:var(--bx-lt);transform:translateY(-2px);box-shadow:0 8px 28px rgba(92,26,46,.3)}
.float-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--bx-dk);border-top:1px solid rgba(196,154,122,.25);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.float-bar.show{transform:translateY(0)}
.float-bar-text{font-size:13px;color:rgba(255,255,255,.75)}
.float-bar-text strong{color:var(--gold-lt)}
.float-bar-cta{background:var(--gold);color:var(--bx);border:none;cursor:pointer;font-family:var(--ff);font-weight:700;font-size:13px;padding:10px 22px;border-radius:100px;white-space:nowrap;transition:all .2s;text-decoration:none;display:inline-block}
.float-bar-cta:hover{background:#d4ab8c}
.hero{min-height:94vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;background:linear-gradient(158deg,var(--bx-dk) 0%,var(--bx) 100%);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(196,154,122,.18) 0%,transparent 65%);pointer-events:none}
.hero-h1{font-family:var(--fs);font-size:clamp(2rem,5.5vw,4rem);font-weight:700;color:#fff;line-height:1.12;max-width:840px;margin-bottom:32px;position:relative;z-index:1;text-wrap:pretty}
.hero-h1 em{font-style:normal;color:var(--gold-lt)}
.desktop-only-title{display:inline}
.desktop-only-pain-title{display:block}
.hero-sub{font-size:18px;color:rgba(255,255,255,.65);max-width:520px;margin-bottom:44px;line-height:1.75;position:relative;z-index:1}
.hero-cta{display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;z-index:1;width:100%;max-width:480px}
.hero-note{font-size:12px;color:rgba(255,255,255,.4)}
.hero-note strong{color:rgba(255,255,255,.65)}
.hero-stats{display:flex;gap:48px;margin-top:60px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.stat{text-align:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:14px 18px;min-width:150px;backdrop-filter:blur(2px)}
.stat-n{font-family:var(--fs);font-size:30px;font-weight:700;color:#fff;line-height:1}
.stat-n span{color:var(--gold-lt)}
.stat-l{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;margin-top:4px}
.urgency-top{background:linear-gradient(90deg,var(--bx-dk),var(--bx),var(--bx-dk));padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.urg-dot{width:8px;height:8px;border-radius:50%;background:var(--gold-lt);animation:pulse 1.3s ease-in-out infinite;flex-shrink:0}
.urg-text{font-size:14px;font-weight:600;color:rgba(255,255,255,.9)}
.urg-text span{color:var(--gold-lt)}
.vagas-count{display:inline-flex;align-items:center;gap:6px;background:rgba(196,154,122,.2);border:1px solid rgba(196,154,122,.4);border-radius:100px;padding:4px 12px;font-size:13px;font-weight:700;color:var(--gold-lt);font-family:var(--fs)}
.vagas-num{font-size:18px;font-weight:800;color:#fff}
.strip{border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2);padding:18px 32px;display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap}
.strip-item{display:flex;align-items:center;gap:8px;color:var(--mid);font-size:13px;font-weight:500}
.strip-ck{color:var(--gold)}
.carousel-wrap{background:var(--bg2);padding:48px 0;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.carousel-label{text-align:center;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:28px}
.carousel-track-wrap{overflow:hidden}
.carousel-track{display:flex;gap:16px;animation:scrollX 30s linear infinite;width:max-content}
.carousel-track:hover{animation-play-state:paused}
.car-item{width:200px;height:220px;border-radius:14px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:#fff;box-shadow:0 2px 12px rgba(92,26,46,.06);transition:transform .3s,box-shadow .3s}
.car-item:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(92,26,46,.12)}
.car-item img{width:100%;height:100%;object-fit:cover}
/* Banners: só aparecem no mobile */
.mid-banner{display:none;width:100%;background:#1c0a12}
.mid-banner img{display:block;width:100%;height:auto}
.sec{padding:80px 24px}
.sec-cream{background:var(--bg2)}
.sec-dark{background:linear-gradient(158deg,var(--bx-dk) 0%,var(--bx) 100%)}
.c{max-width:860px;margin:0 auto}
.cw{max-width:1060px;margin:0 auto}
.tag{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.tag-lt{color:var(--gold-lt)}
.h2{font-family:var(--fs);font-size:clamp(1.7rem,3.2vw,2.7rem);font-weight:700;letter-spacing:-.01em;line-height:1.18;margin-bottom:16px;color:var(--bx);text-wrap:pretty}
.h2 em{font-style:normal;color:var(--gold)}
.h2-lt{color:#fff}.h2-lt em{color:var(--gold-lt)}
.sub{font-size:16px;color:var(--mid);line-height:1.75}
.sub-lt{color:rgba(255,255,255,.6)}
.pain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:36px}
.pain-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;gap:12px;align-items:flex-start;transition:border-color .2s,box-shadow .2s}
.pain-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(92,26,46,.06)}
.pain-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0}
.pain-text{font-size:14px;color:var(--mid);line-height:1.55}
.wyg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2px;margin-top:40px;border:1px solid var(--border);border-radius:16px;overflow:hidden}
.wyg-card{background:#fff;padding:28px 24px;transition:background .2s}
.wyg-card:hover{background:var(--bg)}
.wyg-n{font-family:var(--fs);font-size:30px;font-weight:700;color:var(--border);line-height:1;margin-bottom:10px}
.wyg-title{font-size:15px;font-weight:700;color:var(--bx);margin-bottom:8px}
.wyg-body{font-size:13px;color:var(--mid);line-height:1.6}
.career-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2px;margin-top:40px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.career-card{background:rgba(255,255,255,.05);padding:26px 22px;text-align:center;transition:background .2s;border:none}
.career-card:hover{background:rgba(255,255,255,.09)}
.career-badge{display:inline-block;background:rgba(196,154,122,.2);border:1px solid rgba(196,154,122,.3);border-radius:100px;padding:3px 12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:12px}
.career-name{font-family:var(--fs);font-size:17px;font-weight:700;color:#fff;margin-bottom:8px}
.career-desc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.55}
.brand-section{position:relative;overflow:hidden;padding:100px 24px;background:#1c0a12}
.brand-grid-bg{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.018) 60px,rgba(255,255,255,.018) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.018) 60px,rgba(255,255,255,.018) 61px)}
.brand-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(196,154,122,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.brand-inner{position:relative;z-index:1;max-width:1060px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.brand-label{display:inline-block;background:rgba(196,154,122,.15);border:1px solid rgba(196,154,122,.3);border-radius:100px;padding:6px 14px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:20px}
.brand-h{font-family:var(--fs);font-size:clamp(1.7rem,3vw,2.6rem);font-weight:700;color:#fff;line-height:1.18;margin-bottom:20px;text-wrap:pretty}
.brand-h em{font-style:normal;color:var(--gold-lt)}
.brand-body{font-size:16px;color:rgba(255,255,255,.65);line-height:1.8;margin-bottom:32px}
.brand-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.brand-stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px 20px}
.brand-stat-n{font-family:var(--fs);font-size:26px;font-weight:700;color:var(--gold-lt);line-height:1}
.brand-stat-l{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.brand-visual{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.brand-img-card{border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08);aspect-ratio:1}
.brand-img-card img{width:100%;height:100%;object-fit:cover}
.brand-img-card-tall{border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08);grid-column:1/-1}
.brand-img-card-tall img{width:100%;height:240px;object-fit:cover}
.t-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:40px}
.t-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:26px;transition:border-color .2s,box-shadow .2s}
.t-card:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(92,26,46,.07)}
.t-stars{color:var(--gold);font-size:12px;letter-spacing:2px;margin-bottom:12px}
.t-text{font-family:var(--fs);font-style:normal;font-size:15px;color:var(--mid);line-height:1.75;margin-bottom:18px}
.t-author{display:flex;align-items:center;gap:10px}
.t-av{width:36px;height:36px;border-radius:50%;background:rgba(92,26,46,.08);border:1px solid rgba(92,26,46,.2);display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:15px;font-weight:700;color:var(--bx)}
.t-name{font-size:13px;font-weight:600;color:var(--bx)}
.t-role{font-size:11px;color:var(--muted)}
.offer-box{max-width:640px;margin:0 auto;background:#fff;border:1px solid rgba(196,154,122,.4);border-radius:20px;overflow:hidden;box-shadow:0 12px 48px rgba(92,26,46,.1)}
.offer-hd{background:linear-gradient(135deg,var(--bx-dk),var(--bx));padding:32px 40px 28px;text-align:center;border-bottom:1px solid rgba(196,154,122,.2)}
.offer-hd-tag{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:6px}
.offer-hd-title{font-family:var(--fs);font-size:26px;font-weight:700;color:#fff}
.offer-body{padding:36px 40px}
.offer-list{list-style:none;margin-bottom:24px}
.offer-list li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--mid)}
.offer-list li:last-child{border-bottom:none}
.offer-ck{color:var(--gold);font-size:15px;flex-shrink:0}
.offer-bonus{background:rgba(196,154,122,.09);border:1px dashed rgba(196,154,122,.4);border-radius:10px;padding:14px 18px;margin-bottom:24px}
.offer-bonus-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.offer-bonus-list{list-style:none}
.offer-bonus-list li{font-size:13px;color:var(--mid);padding:3px 0;display:flex;gap:8px;align-items:flex-start}
.offer-bonus-list li::before{content:'✦';color:var(--gold);flex-shrink:0;font-size:10px;margin-top:3px}
.offer-pricing{text-align:center;margin-bottom:28px}
.offer-was{font-size:13px;color:var(--muted);text-decoration:line-through;margin-bottom:4px}
.offer-price{font-family:var(--fs);font-size:60px;font-weight:700;color:var(--bx);line-height:1;letter-spacing:-.02em}
.offer-price sup{font-size:26px;vertical-align:super;color:var(--mid)}
.offer-mo{font-size:13px;color:var(--muted);margin-top:4px}
.offer-vagas{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;padding:10px 16px;background:rgba(92,26,46,.06);border-radius:10px;border:1px solid rgba(92,26,46,.12)}
.offer-vagas-dot{width:8px;height:8px;border-radius:50%;background:#e05c3a;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
.offer-vagas-text{font-size:13px;font-weight:600;color:var(--bx)}
.obj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:36px}
.obj-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 22px;transition:border-color .2s}
.obj-card:hover{border-color:var(--gold)}
.obj-q{font-family:var(--fs);font-style:normal;font-size:14px;font-weight:700;color:var(--bx);margin-bottom:8px}
.obj-a{font-size:13px;color:var(--mid);line-height:1.65}
.guar-inner{max-width:500px;margin:0 auto;text-align:center;background:#fff;border:2px solid var(--border);border-radius:18px;padding:44px 36px}
.guar-icon{font-size:44px;margin-bottom:16px;display:block}
.guar-title{font-family:var(--fs);font-size:24px;font-weight:700;color:var(--bx);margin-bottom:12px}
.guar-body{font-size:15px;color:var(--mid);line-height:1.8}
.guar-days{display:inline-block;background:rgba(92,26,46,.07);border:1px solid rgba(92,26,46,.15);border-radius:100px;padding:6px 18px;font-size:13px;font-weight:700;color:var(--bx);margin-top:14px;letter-spacing:.02em}
.faq-list{margin-top:36px}
.faq-item{border-bottom:1px solid var(--border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:20px 0;font-size:15px;font-weight:600;cursor:pointer;gap:16px;color:var(--bx);transition:color .15s;user-select:none}
.faq-q:hover{color:var(--bx-lt)}
.faq-plus{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;color:var(--gold);flex-shrink:0;transition:transform .3s,background .2s}
.faq-plus.open{transform:rotate(45deg);background:rgba(92,26,46,.08)}
.faq-a{overflow:hidden;max-height:0;transition:max-height .38s ease,padding .3s;font-size:14px;color:var(--mid);line-height:1.8;padding:0}

function useIsMobile(breakpoint = 700) {
  const [mobile, setMobile] = useState(() => window.innerWidth <= breakpoint);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth <= breakpoint);
    window.addEventListener('resize', handler, { passive: true });
    return () => window.removeEventListener('resize', handler);
  }, [breakpoint]);
  return mobile;
}

      if (e.isIntersecting && !started) {
        setStarted(true);
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(ease * target));

    return () => obs.disconnect();
  }, [started, target, duration]);

<script>
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
}, { threshold: 0.1 });
function initReveal() {
  document.querySelectorAll('[data-reveal],[data-reveal-scale]').forEach(el => io.observe(el));
}
setTimeout(initReveal, 400);
const rootEl = document.getElementById('root');
if (rootEl) new MutationObserver(initReveal).observe(rootEl, { childList:true, subtree:true });
</script>
